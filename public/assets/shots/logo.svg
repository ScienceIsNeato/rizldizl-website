      <stop offset="33%"  stop-color="#FFDD00"/>
      <stop offset="50%"  stop-color="#00CC44"/>
      <stop offset="66%"  stop-color="#0088FF"/>
      <stop offset="83%"  stop-color="#6644FF"/>
      <stop offset="100%" stop-color="#DD00FF"/>
    </linearGradient>
  </defs>
  <!-- Keyboard body -->
  <rect x="0.5" y="0.5" width="35" height="27" rx="3" ry="3" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
  <!-- Row 1: 10 keys -->
  <rect x="3"  y="3"  width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.95"/>
