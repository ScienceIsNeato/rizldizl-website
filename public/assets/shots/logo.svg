  <rect x="21" y="3"  width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.95"/>
  <rect x="24" y="3"  width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.95"/>
  <rect x="27" y="3"  width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.95"/>
  <rect x="30" y="3"  width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.95"/>
  <!-- Row 2: 9 keys offset -->
  <rect x="4"  y="7.5" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.85"/>
  <rect x="7"  y="7.5" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.85"/>
  <rect x="10" y="7.5" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.85"/>
  <rect x="13" y="7.5" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.85"/>
  <rect x="16" y="7.5" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.85"/>
  <rect x="19" y="7.5" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.85"/>
  <rect x="22" y="7.5" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.85"/>
  <rect x="25" y="7.5" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.85"/>
  <rect x="28" y="7.5" width="5"   height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.85"/>
  <!-- Row 3: 8 keys offset -->
  <rect x="3"  y="12" width="4"   height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.75"/>
  <rect x="7.5" y="12" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.75"/>
  <rect x="10.5" y="12" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.75"/>
  <rect x="13.5" y="12" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.75"/>
  <rect x="16.5" y="12" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.75"/>
  <rect x="19.5" y="12" width="2.5" height="3.5" rx="0.5" fill="url(#rainbow)" opacity="0.75"/>
